<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaPulse | Stock Prediction AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Alpha<span>Pulse</span></h1>
            <p class="tagline">Next-Gen Time Series AI Forecast</p>
        </header>

        <main>
            <div class="input-card">
                <div class="search-box">
                    <input type="text" id="tickerInput" placeholder="Enter Ticker (e.g. GOOG, AAPL, 1398.HK)" autocomplete="off">
                    <button id="predictBtn">Analyze</button>
                </div>
            </div>

            <div id="resultContainer" class="result-card hidden">
                <div class="result-header">
                    <div class="ticker-info">
                        <h2 id="tickerDisplay">---</h2>
                        <p id="priceDisplay">$0.00</p>
                    </div>
                    <div id="signalBadge" class="badge">---</div>
                </div>

                <div class="prediction-details">
                    <div class="prob-chart-container">
                        <canvas id="probChart"></canvas>
                    </div>
                    <div class="stats">
                        <div class="stat-item">
                            <span class="label">Forecast Horizon</span>
                            <span class="value">7 Days</span>
                        </div>
                        <div class="stat-item">
                            <span class="label">Model Confidence</span>
                            <span id="confidenceValue" class="value">0%</span>
                        </div>
                        <div class="stat-item">
                            <span class="label">Threshold</span>
                            <span class="value">±3.0%</span>
                        </div>
                    </div>
                </div>
                
                <div class="disclaimer">
                    * Predictions are based on historical patterns and are not financial advice.
                </div>
            </div>

            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p>Analyzing market dynamics...</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
